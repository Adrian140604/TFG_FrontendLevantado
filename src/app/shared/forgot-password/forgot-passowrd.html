<div class="row justify-content-center">
  <div class="col-12 col-md-8 col-lg-5">
    <div class="card shadow-sm border-0">
      <div class="card-body p-4">
        <h2 class="text-center mb-4">Recuperar contraseña</h2>

        @if (errorMessage) {
          <div class="alert alert-danger" role="alert">
            {{ errorMessage }}
          </div>
        }

        @if (successMessage) {
          <div class="alert alert-success" role="alert">
            {{ successMessage }}
          </div>
        }

        <form [formGroup]="forgotPasswordForm" (ngSubmit)="submit()">
          <div class="mb-3">
            <label for="institutionalEmail" class="form-label">Correo electrónico</label>
            <input
              id="institutionalEmail"
              type="email"
              class="form-control"
              formControlName="institutionalEmail"
            >

            @if (hasError('institutionalEmail', 'required')) {
              <small class="text-danger">El correo es obligatorio.</small>
            }

            @if (hasError('institutionalEmail', 'email')) {
              <small class="text-danger">El formato del correo no es válido.</small>
            }
          </div>

          <div class="d-grid mb-3">
            <button
              type="submit"
              class="btn btn-primary"
              [disabled]="isSubmitting"
            >
              @if (!isSubmitting) {
                Enviar email
              } @else {
                Enviando...
              }
            </button>
          </div>

          <div class="text-center">
            <a routerLink="/login" class="text-decoration-none">
              Volver al login
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
